<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Educare AI</title>
    <script>
        const params = new URLSearchParams(window.location.search);
        const videoId = params.get('id');

        if (videoId) {
            // En Android abre tu app directamente
            window.location.href =
                "intent://trailers/video?id=" + videoId +
                "#Intent;scheme=https;host=stef7773.github.io;" +
                "package=com.educareai.app;" +
                "S.browser_fallback_url=https://www.youtube.com/watch?v=" + videoId +
                ";end";
        } else {
            window.location.replace("https://m.youtube.com");
        }
    </script>
</head>
<body>
    <p>Abriendo en Educare AI...</p>
</body>
</html>
