<!DOCTYPE html>
<html>
<head>
    <title>Educare AI</title>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');

        if (videoId) {
            // 1. Intentar abrir directo en la app via intent Android
            const appIntent = "intent://trailers/video?id=" + videoId +
                "#Intent;scheme=https;package=com.educareai.app;" +
                "S.browser_fallback_url=https://stef7773.github.io/trailers/video?id=" + videoId +
                ";end";

            window.location.href = appIntent;
        } else {
            window.location.replace("https://m.youtube.com");
        }
    </script>
</head>
<body>
    <p>Abriendo en Educare AI...</p>
</body>
</html>
